name: Build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Download Setup DLLs
      run: |
        # MelonLoaderとUnityEngineの両方を手に入れる
        curl -L -o MelonLoader.zip https://github.com/LavaGang/MelonLoader/releases/download/v0.6.1/MelonLoader.x64.zip
        powershell Expand-Archive -Path MelonLoader.zip -DestinationPath .
        # UnityEngineがないと言われないよう、空の参照を作るか、ネットから拾う
        dotnet add package UnityEngine.Modules --version 2021.3.0
    - name: Build Mod
      run: |
        dotnet build Project.csproj --configuration Release /p:MelonLoaderPath=.
    - uses: actions/upload-artifact@v4
      with:
        name: ModFile
        path: bin/Release/net6.0/*.dll
