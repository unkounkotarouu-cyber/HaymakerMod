name: Build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Download and Setup MelonLoader
      run: |
        # zipを落として、中身を全部ぶちまける
        curl -L -o MelonLoader.zip https://github.com/LavaGang/MelonLoader/releases/download/v0.6.1/MelonLoader.x64.zip
        powershell Expand-Archive -Path MelonLoader.zip -DestinationPath .
    - name: Build Mod
      run: |
        # ここで MelonLoader.dll がどこにあるか直接指定してビルドする
        dotnet build Project.csproj --configuration Release /p:MelonLoaderPath=.
