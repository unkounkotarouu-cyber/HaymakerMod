name: Build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Download MelonLoader Directly
      run: |
        # 公式のGitHubから直接DLLを引っこ抜いてくる
        curl -L -o MelonLoader.zip https://github.com/LavaGang/MelonLoader/releases/download/v0.6.1/MelonLoader.x64.zip
        tar -xf MelonLoader.zip MelonLoader.dll
    - run: dotnet build Project.csproj --configuration Release
    - uses: actions/upload-artifact@v4
      with:
        name: ModFile
        path: bin/Release/net6.0/*.dll
